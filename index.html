  <style>
    @property --angle {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    @property --angle2 {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    @property --hue {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    .splash {
      z-index: 100;
      height: 100vh;
      width: 100vw;

      position: fixed;
      top: 0;
      left: 0;
      background-color: var(--bg);

      display: flex;

      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .circle-gradient {

      width: 6rem;
      height: 6rem;
      border-radius: 50%;
      background: #eeeeee00;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .circle-gradient::before {
      content: '';
      position: absolute;
      inset: -20px;
      padding: 1.5rem;
      border-radius: 50%;
      background: conic-gradient(#00ffcc00 var(--angle2),
          var(--text) 0deg,
          hsl(var(--hue), 100%, 20%) var(--angle),
          #00ffcc00 0deg,
          #00ffcc00);
      z-index: -1;

      mask: linear-gradient(#ffffff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask-composite: exclude;


      animation: rotate 0.9s infinite ease-in-out;
    }



    @keyframes rotate {
      0% {
        --angle: 0deg;
        --angle2: 0deg;

        --hue: 200deg
      }

      50% {
        --angle: 360deg;
        --angle2: 0deg;
      }

      100% {
        --angle2: 360deg;
        --angle: 360deg;

        --hue: 300deg;
      }
    }
  </style>


</head>

<body style="padding: 0%; margin: 0%;">

  <script>
    let theme = getCookie("theme")
    if (theme === undefined) {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.remove('light')
        theme = "dark"
      }
      else {
        document.body.classList.add('light')
        theme = "light"
      }
    }
    else {
      if (theme == "light") {
        document.body.classList.add('light')
        theme = "light"
      }
      else {
        document.body.classList.remove('light')
        theme = "dark"
      }
    }

    function toggleTheme() {
      if (theme == "light") {
        document.body.classList.remove('light')
        theme = "dark"
      }
      else {
        document.body.classList.add('light')
        theme = "light"
      }
      document.cookie = `theme=${theme}; max-age=2592000; Path=/`;
    }

    function getCookie(name) {
      let matches = document.cookie.match(new RegExp(
        "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
      ));
      return matches ? decodeURIComponent(matches[1]) : undefined;
    }


  </script>

  <div

    </div>
    <div class="option-icon" id="openbtn" onclick="toggleTheme()">
